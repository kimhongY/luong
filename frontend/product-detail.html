<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>លម្អិតទំនិញ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:var(--tg-theme-bg-color,#f5f5f5);color:var(--tg-theme-text-color,#222);padding:16px;padding-bottom:80px}
        .back-btn{width:36px;height:36px;background:var(--tg-theme-secondary-bg-color,white);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:0 2px 4px rgba(0,0,0,.1);text-decoration:none;color:inherit;margin-bottom:16px}
        .product-img{width:100%;height:250px;object-fit:cover;border-radius:16px;margin-bottom:16px;background:#eee}
        .product-name{font-size:24px;font-weight:bold;margin-bottom:8px}
        .product-category{color:#667eea;font-size:14px;margin-bottom:8px}
        .stars{color:#ffd700;font-size:20px;margin-bottom:8px}
        .price{font-size:32px;color:#28a745;font-weight:bold;margin-bottom:8px}
        .stars-price{color:#666;font-size:14px;margin-bottom:16px}
        .desc{line-height:1.6;margin-bottom:20px;color:#666}
        .stock{font-size:14px;margin-bottom:8px}
        .add-cart-btn{position:fixed;bottom:16px;left:16px;right:16px;padding:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer}
        .reviews{margin-top:20px}
        .review{background:white;border-radius:12px;padding:12px;margin-bottom:8px}
        .review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .review-stars{color:#ffd700}
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">←</a>
    <div id="content">Loading...</div>
    <button class="add-cart-btn" onclick="addToCart()">+ បន្ថែមចូលកន្ត្រក</button>

    <script>
        const tg=Telegram.WebApp;tg.ready();tg.expand();
        const API='http://localhost:5000'; // ប្តូរទៅ Backend URL
        const id=new URLSearchParams(location.search).get('id');
        let product=null;
        
        (async()=>{
            const pr=await fetch(API+'/api/products/'+id);product=await pr.json();
            const rr=await fetch(API+'/api/reviews/'+id);const reviews=await rr.json();
            document.getElementById('content').innerHTML=`
                ${product.image_url?`<img src="${product.image_url}" class="product-img">`:'<div class="product-img" style="display:flex;align-items:center;justify-content:center;font-size:64px">📦</div>'}
                <div class="product-category">${product.category||'General'}</div>
                <h1 class="product-name">${product.name}</h1>
                <div class="stars">${'⭐'.repeat(Math.round(product.rating))} ${product.rating} (${product.total_reviews} reviews)</div>
                <div class="price">$${product.price.toFixed(2)}</div>
                <div class="stars-price">ឬ ${product.stars_price} Telegram Stars</div>
                <div class="stock">ស្តុក: ${product.stock>0?product.stock+' នៅសល់':'អស់ពីស្តុក'}</div>
                <p class="desc">${product.description||'No description'}</p>
                <div class="reviews"><h3>Reviews (${reviews.total_reviews})</h3>${reviews.reviews.map(r=>`<div class="review"><div class="review-header"><strong>${r.first_name}</strong> <span class="review-stars">${'⭐'.repeat(r.rating)}</span></div>${r.comment?`<p>${r.comment}</p>`:''}</div>`).join('')}</div>`;
        })();
        
        function addToCart(){
            if(!product)return;
            let cart=JSON.parse(localStorage.getItem('cart')||'[]');
            let existing=cart.find(i=>i.id===product.id);
            existing?existing.quantity+=1:cart.push({...product,quantity:1});
            localStorage.setItem('cart',JSON.stringify(cart));
            alert('✅ បានបន្ថែមចូលកន្ត្រក!');
        }
    </script>
</body>
</html>
