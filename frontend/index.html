<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:var(--tg-theme-bg-color,#f5f5f5);color:var(--tg-theme-text-color,#222);padding:16px 16px 80px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        h2{margin:0}
        .nav-icons{display:flex;gap:10px}
        .nav-icon{width:38px;height:38px;background:var(--tg-theme-secondary-bg-color,white);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.1);text-decoration:none;color:inherit}
        .cart-badge{position:absolute;top:-4px;right:-4px;background:#ff4444;color:white;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold}
        .categories{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
        .category-chip{padding:8px 16px;background:var(--tg-theme-secondary-bg-color,white);border-radius:20px;white-space:nowrap;cursor:pointer;font-size:14px;box-shadow:0 2px 4px rgba(0,0,0,.1);transition:all .2s}
        .category-chip.active{background:var(--tg-theme-button-color,#667eea);color:var(--tg-theme-button-text-color,white)}
        .product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
        .product-card{background:var(--tg-theme-secondary-bg-color,white);border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s}
        .product-card:active{transform:scale(.95)}
        .product-image{width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px;background:#eee}
        .product-category{color:var(--tg-theme-button-color,#667eea);font-size:11px;font-weight:600}
        .product-name{font-weight:600;margin:4px 0;font-size:15px}
        .product-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
        .product-price{color:#28a745;font-weight:bold;font-size:18px}
        .product-stars{font-size:11px;color:#888}
        .add-btn{background:var(--tg-theme-button-color,#667eea);color:var(--tg-theme-button-text-color,white);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .empty-state{text-align:center;padding:40px;color:#999}
    </style>
</head>
<body>
    <div class="header">
        <h2>🛍️ Mini Shop</h2>
        <div class="nav-icons">
            <a class="nav-icon" href="search.html">🔍</a>
            <a class="nav-icon" href="cart.html">🛒<span class="cart-badge" id="cart-count">0</span></a>
            <a class="nav-icon" href="dashboard.html">👤</a>
        </div>
    </div>
    <div class="categories" id="categories"><div class="category-chip active" onclick="filterByCategory('')">ទាំងអស់</div></div>
    <div class="product-grid" id="product-grid"></div>

    <script>
        const tg=window.Telegram.WebApp;tg.ready();tg.expand();
        const API_URL='https://kimhongy.github.io/luong/'; // ប្តូរទៅ Backend URL
        let products=[],currentCat='';
        
        async function loadProducts(){
            try{
                const r=await fetch(API_URL+'/api/products');
                products=await r.json();
                loadCategories();displayProducts();
            }catch(e){console.error(e);}
        }
        function loadCategories(){
            const cats=[...new Set(products.map(p=>p.category).filter(Boolean))];
            document.getElementById('categories').innerHTML='<div class="category-chip active" onclick="filterByCategory(\'\')">ទាំងអស់</div>'+cats.map(c=>`<div class="category-chip" onclick="filterByCategory('${c}')">${c}</div>`).join('');
        }
        function filterByCategory(cat){currentCat=cat;document.querySelectorAll('.category-chip').forEach(el=>el.classList.toggle('active',el.textContent===cat||(cat===''&&el.textContent==='ទាំងអស់')));displayProducts();}
        function displayProducts(){
            const filtered=currentCat?products.filter(p=>p.category===currentCat):products;
            document.getElementById('product-grid').innerHTML=filtered.length?filtered.map(p=>`
                <div class="product-card" onclick="viewProduct(${p.id})">
                    ${p.image_url?`<img src="${p.image_url}" alt="${p.name}" class="product-image">`:`<div class="product-image" style="display:flex;align-items:center;justify-content:center;font-size:32px">📦</div>`}
                    <div class="product-category">${p.category||'General'}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-footer">
                        <div><div class="product-price">$${p.price.toFixed(2)}</div><div class="product-stars">${p.stars_price} ⭐</div></div>
                        <button class="add-btn" onclick="event.stopPropagation();addToCart(${JSON.stringify(p).replace(/"/g,'&quot;')})">+</button>
                    </div>
                </div>`).join(''):'<div class="empty-state">No products found</div>';
            updateCartBadge();
        }
        function addToCart(product){
            let cart=JSON.parse(localStorage.getItem('cart')||'[]');
            let existing=cart.find(i=>i.id===product.id);
            existing?existing.quantity+=1:cart.push({...product,quantity:1});
            localStorage.setItem('cart',JSON.stringify(cart));updateCartBadge();
            if(tg.HapticFeedback)tg.HapticFeedback.impactOccurred('light');
            alert('✅ បានបន្ថែមចូលកន្ត្រក!');
        }
        function updateCartBadge(){document.getElementById('cart-count').textContent=JSON.parse(localStorage.getItem('cart')||'[]').reduce((s,i)=>s+i.quantity,0);}
        function viewProduct(id){location.href=`product-detail.html?id=${id}`;}
        loadProducts();
    </script>
</body>
</html>
